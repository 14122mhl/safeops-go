settings:
  default_engine: ansible
  default_env: dev
  require_prod_confirm: true
  min_goal_confidence_to_apply: 0.75
api:
  provider: ""
  deepseek:
    enabled: false
    api_key: ""
    base_url: https://api.deepseek.com
    model: deepseek-chat
    timeout: 30
rag:
  enabled: false
  paths:
    - docs/playbooks
  max_documents: 3
  max_chars: 1200
risk_rules:
  shell:
    risk: HIGH
    reason: runs arbitrary shell commands
    recommendation: review the command and limit the host scope
  reboot:
    risk: HIGH
    reason: reboots target machines
    recommendation: use controlled batches and verify redundancy
  service:
    risk: HIGH
    reason: may change service state and availability
    recommendation: use a staged rollout and verify service health
  systemd:
    risk: HIGH
    reason: may change systemd service state
    recommendation: limit host scope and verify service impact
  copy:
    risk: MEDIUM
    reason: modifies files on target hosts
    recommendation: review dry-run diff before apply
  template:
    risk: MEDIUM
    reason: renders and writes configuration files
    recommendation: review generated diff and reload impact
  file:
    risk: MEDIUM
    reason: changes paths, ownership, or permissions
    recommendation: verify paths and ownership before apply
  debug:
    risk: LOW
    reason: prints information only
    recommendation: ensure output does not expose secrets
