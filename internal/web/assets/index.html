<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>safeops-go</title>
<style>
:root{--bg:#07111f;--panel:#101d31;--line:#263957;--text:#eaf1fb;--muted:#91a3be;--green:#45d6a3;--blue:#79a8ff;--red:#ff7a86}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 0,#12372f 0,transparent 30rem),var(--bg);color:var(--text);font:14px system-ui,sans-serif}header{padding:22px 28px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}h1{margin:0;font-size:21px}.tag{color:var(--green)}main{display:grid;grid-template-columns:380px 1fr 320px;gap:18px;padding:22px}.panel{background:rgba(16,29,49,.96);border:1px solid var(--line);border-radius:12px;padding:18px}h2{font-size:15px;margin:0 0 16px}label{display:block;color:var(--muted);margin:12px 0 6px}input,textarea,select{width:100%;background:#081426;color:var(--text);border:1px solid var(--line);border-radius:7px;padding:10px}textarea{min-height:88px;resize:vertical}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.checks{display:flex;gap:16px;margin:16px 0;color:var(--muted)}.checks input{width:auto}button{border:0;border-radius:8px;padding:11px 15px;background:var(--green);font-weight:800;cursor:pointer}button:disabled{opacity:.5}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}.metric{background:#0a1729;padding:12px;border-radius:8px}.metric small{color:var(--muted);display:block}.metric strong{display:block;margin-top:6px}pre{background:#050d19;border:1px solid var(--line);border-radius:8px;padding:14px;min-height:420px;max-height:640px;overflow:auto;white-space:pre-wrap;color:#d9e6f7}.list{display:grid;gap:9px}.item{border:1px solid var(--line);border-radius:8px;padding:10px}.item small{color:var(--muted)}@media(max-width:1100px){main{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body><header><div><h1>safeops-go</h1><span class="tag">safe change agent · Go learning edition</span></div><span id="platform">loading…</span></header>
<main>
<section class="panel"><h2>Change Goal</h2><label>自然语言目标</label><textarea id="goal">安全发布 testdata/demo.yml 到 dev</textarea><div class="grid"><div><label>Playbook</label><input id="playbook" value="testdata/demo.yml"></div><div><label>Inventory</label><input id="inventory" value="testdata/inventory.ini"></div></div><div class="grid"><div><label>环境</label><select id="env"><option>dev</option><option>test</option><option>stage</option><option>prod</option></select></div><div><label>Limit</label><input id="limit"></div></div><div class="checks"><label><input id="planOnly" type="checkbox" checked> Plan only</label><label><input id="apply" type="checkbox"> Apply</label><label><input id="approve" type="checkbox"> Approve</label></div><button id="run">Evaluate safely</button></section>
<section class="panel"><h2>Run Evidence</h2><div class="metrics"><div class="metric"><small>Status</small><strong id="status">idle</strong></div><div class="metric"><small>Risk</small><strong id="risk">-</strong></div><div class="metric"><small>Run ID</small><strong id="runId">-</strong></div></div><pre id="output">提交目标后，这里会显示规划、检查、策略与 trace 证据。</pre></section>
<aside class="panel"><h2>Platform</h2><div id="details" class="list"></div><h2 style="margin-top:24px">Recent runs</h2><div id="runs" class="list"></div></aside>
</main>
<script>
const $=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
async function json(url,options){const r=await fetch(url,options);const d=await r.json();if(!r.ok)throw Error(d.error||r.status);return d}
async function status(){const d=await json('/api/status');$('platform').textContent=`API: ${d.api_provider||'local'} · RAG: ${d.rag_enabled?'on':'off'}`;$('details').innerHTML=[['Provider',d.api_provider||'local rules'],['RAG',d.rag_enabled?'enabled':'disabled'],['Boundary','explicit apply only']].map(x=>`<div class="item"><small>${esc(x[0])}</small><br>${esc(x[1])}</div>`).join('')}
async function runs(){const d=await json('/api/runs');$('runs').innerHTML=(d.runs||[]).map(x=>`<div class="item"><b>${esc(x.status)}</b> · ${esc(x.env||'-')}<br><small>${esc(x.goal)}<br>${esc(x.run_id)}</small></div>`).join('')||'<small>暂无运行记录</small>'}
async function run(){const b=$('run');b.disabled=true;$('status').textContent='running';$('output').textContent='Evaluating…';try{const d=await json('/api/goal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal:$('goal').value,playbook:$('playbook').value,inventory:$('inventory').value,env:$('env').value,limit:$('limit').value,plan_only:$('planOnly').checked,apply:$('apply').checked,approve:$('approve').checked})});const r=d.response,t=r.Trace||r.trace;$('status').textContent=r.Status||r.status;$('risk').textContent=t?.analysis?.overall_risk||'-';$('runId').textContent=r.RunID||r.run_id;$('output').textContent=[...(d.output.lines||[]),d.output.stdout||'',d.output.stderr||''].filter(Boolean).join('\n');await runs()}catch(e){$('status').textContent='error';$('output').textContent=e.message}finally{b.disabled=false}}
$('run').onclick=run;Promise.all([status(),runs()]).catch(e=>$('output').textContent=e.message);
</script></body></html>
